<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu | Bean & Brew</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#FDFCF0] flex flex-col min-h-screen">
    
    <div id="nav-container"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 py-16">
        
        <div class="mb-8">
            <a href="index.html" class="text-orange-800 hover:text-orange-900 font-bold flex items-center gap-2 transition group">
                <span class="group-hover:-translate-x-1 transition-transform">←</span> Return to Home
            </a>
        </div>

        <div class="mb-12 text-center md:text-left">
            <h1 class="text-5xl font-bold text-gray-900 mb-4" style="font-family: 'Playfair Display', serif;">Full Menu</h1>
            <p class="text-gray-600 mb-10">Choose from our selection of artisanal coffee and fresh bakes.</p>
            
            <div class="flex justify-start space-x-4 mb-10 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterMenu('All')" class="bg-orange-800 text-white px-8 py-2 rounded-full shadow-md font-bold transition whitespace-nowrap">All Items</button>
                <button onclick="filterMenu('Coffee')" class="bg-white border border-orange-100 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-orange-50 transition whitespace-nowrap">Coffee</button>
                <button onclick="filterMenu('Cakes')" class="bg-white border border-orange-100 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-orange-50 transition whitespace-nowrap">Cakes</button>
                <button onclick="filterMenu('Pastries')" class="bg-white border border-orange-100 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-orange-50 transition whitespace-nowrap">Pastries</button>
                <button onclick="filterMenu('Juices')" class="bg-white border border-orange-100 text-gray-700 px-6 py-2 rounded-full font-bold hover:bg-orange-50 transition whitespace-nowrap">Juices</button>
            </div>
        </div>
        
        <div id="full-menu" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="footer-container"></div>

    <script src="script.js"></script>
    <script>
        // Sirf EK window.onload kafi hai
        window.onload = () => {
            renderNavbar(); 
            renderFooter();
            
            // Check karein ke container exist karta hai ya nahi
            if (document.getElementById('full-menu')) {
                loadProducts('full-menu');
            }
        };
    </script>

</body>
</html>
